<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eventsy | Home</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integ
      rity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header>
      <nav>
        <a href="#home">
          <div class="logo"></div>
        </a>
        <div class="links">
          <a href="#home">home</a>
          <span class="slash">/</span>
          <a href="#about">about</a>
          <span class="slash">/</span>
          <a href="#gallery">gallery</a>
          <span class="slash">/</span>
          <a href="#blog">blog</a>
          <span class="slash">/</span>
          <a href="#contact">contact</a>
        </div>
      </nav>
    </header>
    <!--  -->
    <main id="app"></main>
    <!--  -->
    <footer>
      <div class="content">
        <a href="#home"> <div class="logo"></div></a>
        <div class="address">
          <p>420 Smoke St. Los Angeles, CA 46318</p>
          <p>(213)-467-2627</p>
          <p>info@eventsy.com</p>
        </div>
        <div class="footer-contact">
          <div class="newsletter">
            <input
              type="text"
              placeholder="Enter your email to join newsletter..."
            />
            <a href="#">
              <div class="subscribe-button">SUBSCRIBE</div>
            </a>
          </div>
          <div class="socials">
            <a href="https://www.facebook.com/eventsy/" target="_blank"
              ><i class="fa-brands fa-square-facebook"></i
            ></a>
            <a href="https://www.instagram.com/eventsy/" target="_blank"
              ><i class="fa-brands fa-square-instagram"></i
            ></a>
            <a href="https://www.twitter.com/eventsy/" target="_blank">
              <i class="fa-brands fa-square-twitter"></i
            ></a>
          </div>
        </div>
        <div class="copyright">
          <p>Copyright 2019 eventsy. All rights reserved</p>
        </div>
      </div>
    </footer>
    <script type="module" src="app/app.js" defer=""></script>
  </body>
</html>
